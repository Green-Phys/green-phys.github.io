# Configuration
baseURL: 'https://green-phys.org/'
title: 'Green Software Package'

enableRobotsTXT: true
enableGitInfo: true
enableEmoji: true
hasCJKLanguage: true
enableInlineShortcodes: true
copyright: Green Software Developers 2023-2026

outputs:
  home: [HTML]
  page: [HTML]
  section: [HTML, RSS]

defaultContentLanguage: en

module:
  hugoVersion:
    extended: true
    min: "0.146.0"
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      callouts: true
      passthrough:
        enable: true
        delimiters:
          inline:
            - - $
              - $
          block:
            - - $$
              - $$
  highlight:
    noClasses: false

params:
  description: "Many-body framework for real materials simulation"
  headTitle: "Green - Green's Function Based Ab Initio Simulation Package"
  theme:
    # light | dark | system
    default: system
    displayToggle: true
  page:
    width: normal
  editURL:
    enable: true
    base: "https://github.com/Green-Phys/green-phys.github.io/edit/main/content"
  navbar:
    displayLogo: true
    logo:
      path: logo/rosetta.webp
      dark: logo/rosetta.webp
      width: 36px
  footer:
    displayCopyright: true
  callouts: true

menu:
  main:
    - identifier: installation
      name: Installation
      pageRef: /docs/installation
      weight: 1
    - identifier: start
      name: Getting Started
      pageRef: /docs/getting-started
      weight: 2
    - identifier: documentation
      name: Documentation
      pageRef: /docs
      weight: 3
    - identifier: about
      name: About
      pageRef: /about
      weight: 4
    - identifier: troubleshooting
      name: Troubleshooting
      pageRef: /docs/troubleshoot
      weight: 5
    - name: Search
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/Green-Phys"
      params:
        icon: github
    - name: Discord
      weight: 8
      url: "https://discord.gg/ty9FE6u3mg"
      params:
        icon: discord
    - name: Toggle
      weight: 9
      params:
        type: theme-toggle
        icon: sun
