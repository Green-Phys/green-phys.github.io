{{/* Render raw svg icon from site data */}}
{{- $icon := index (partial "utils/hugo-compat/site-data") "icons" .name -}}

{{- if not $icon -}}
  {{- $icon = (printf "<span class='material-icons'>%s</span>" .name) -}}
{{- else -}}
  {{- $icon = $icon | safeHTML -}}
{{- end -}}

{{- if .attributes -}}
  {{- $icon = replaceRE "<svg" (printf "<svg %s" .attributes) $icon -}}
{{- end -}}
{{- return ($icon | safeHTML) -}}
